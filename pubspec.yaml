name: harvestsync
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  firebase_storage: ^12.4.6
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.8
  firebase_auth: ^5.5.4
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  mobile_scanner: ^7.0.1
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  http: ^0.13.6
  path: ^1.8.3
  pdf: ^3.10.4
  printing: ^5.14.2
  path_provider: ^2.1.1
  pdfrx: ^1.2.0
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2
   
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icono_app.png
    - assets/COOPERATIVA.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icono_app.png"
